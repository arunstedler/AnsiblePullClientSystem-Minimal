---

  - name: Create a directory
    become_user: andrew
    ansible.builtin.file:
      path: "/home/andrew/Pictures/"
      state: directory
      mode: '0664'
      
  - name: Download the wallpaper image
    become_user: andrew
    get_url:
      url: "https://cdn.eso.org/images/screen/eso0932a.jpg"
      dest: "/home/andrew/Pictures/wallpaper.jpg"
      owner: andrew
      group: andrew
      mode: '0644'

  - name: Set GNOME wallpaper
    become_user: andrew
    community.general.dconf:
      key: "/org/gnome/desktop/background/picture-uri"
      value: "'file:///home/andrew/Pictures/wallpaper.jpg'"
      state: present
  
  - name: Set 24 Hour Clock
    become_user: andrew
    community.general.dconf:
      key: "/org/gnome/desktop/interface/clock-format" 
      value: "'24h'"
      state: present
    

  - name: Set Clock Show Weekday
    become_user: andrew
    community.general.dconf:
      key: "/org/gnome/desktop/interface/clock-show-weekday" 
      value: "'true'"
      state: present

  - name: Set Top Bar Show Battery Percentage
    become_user: andrew
    community.general.dconf:
      key: "/org/gnome/desktop/interface/show-battery-percentage" 
      value: "'true'"
      state: present

  - name: Set dock position to bottom using dconf
    become_user: andrew
    community.general.dconf:
      key: "/org/gnome/shell/extensions/dash-to-dock/dock-position" 
      value: "'BOTTOM'"
      state: present

  - name: Disable "extend to screen edge" (to center it) using dconf
    become_user: andrew
    community.general.dconf:
      key: "/org/gnome/shell/extensions/dash-to-dock/extend-height" 
      value: "false"
      state: present

  - name: Disable natural scrolling for touchpad (enables traditional scrolling)
    become_user: andrew
    community.general.dconf:
      key: "/org/gnome/desktop/peripherals/touchpad/natural-scroll" 
      value: "false"
      state: present

  - name: Enable dash-to-dock in dconf
    ansible.builtin.command:
      cmd: >
        dconf write /org/gnome/shell/enabled-extensions 
        "{{ (current_extensions.stdout | default('[]') | regex_replace('\\s', '') | replace(\"'\", \"\\\"\") | from_json + [extension_uuid]) | unique | to_json }}"
    when: extension_uuid not in current_extensions.stdout
    
  - name: Set Dash to Dock preferences (Example - autohide and bottom position)
    become_user: andrew
    ansible.builtin.shell: |
      dconf write /org/gnome/shell/extensions/dash-to-dock/dock-position "BOTTOM"
      dconf write /org/gnome/shell/extensions/dash-to-dock/intellihide false
      dconf write /org/gnome/shell/extensions/dash-to-dock/dock-fixed false
